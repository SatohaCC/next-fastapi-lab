services:
  backend:
    build:
      context: ./backend
      target: development # ここでDockerfile内のステージを指定！
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file: .env

  frontend:
    build:
      context: ./frontend
      target: development
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - API_URL=http://backend:8000
